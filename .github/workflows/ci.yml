name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go version
        run: go version

      - name: Format check
        run: |
          test -z "$(gofmt -l .)"

      - name: Unit tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Coverage
        run: go test -cover ./...

      - name: Race
        run: go test -race ./...
